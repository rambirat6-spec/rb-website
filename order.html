<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

h2{
text-align:center;
}

form{
max-width:400px;
margin:auto;
background:#020617;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
background:#22c55e;
padding:12px;
width:100%;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2>📩 Order Form</h2>

<form onsubmit="sendWhatsApp(); return false;">
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Your Phone" required>

<select id="service">
<option>Website</option>
<option>Shop Website</option>
<option>Business Website</option>
</select>

<textarea id="msg" placeholder="Your Requirement"></textarea>

<button type="submit">Send on WhatsApp</button>
</form>

<script>
function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let service=document.getElementById("service").value;
let msg=document.getElementById("msg").value;

let url="https://wa.me/917082575384?text="
+"Name: "+name+"%0a"
+"Phone: "+phone+"%0a"
+"Service: "+service+"%0a"
+"Message: "+msg;

window.open(url,"_blank");
}
</script>

</body>
</html>
