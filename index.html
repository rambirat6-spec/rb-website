<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Website Service</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  text-align: center;
}

/* Logo */
.logo {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 40px;
  animation: spin 6s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* Title */
h1 {
  font-size: 32px;
  margin-top: 20px;
}

.tagline {
  color: #aaa;
  margin: 10px;
}

/* Button */
.btn {
  background: #00cfff;
  color: #000;
  padding: 12px 25px;
  border-radius: 25px;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
  font-weight: bold;
}

/* Contact */
.contact {
  margin-top: 10px;
  color: #00ffff;
}

/* Offer Box */
.offer {
  background: #111;
  margin: 30px;
  padding: 20px;
  border-radius: 15px;
}

.timer {
  font-size: 24px;
  color: #00ffcc;
}

/* WhatsApp Button */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 12px 18px;
  border-radius: 50px;
  color: #fff;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- Logo -->
<img src="logo.png" class="logo">

<h1>RB Website Service</h1>
<p class="tagline">Apni Shop ko Online lekar jao 🚀</p>

<a href="#" class="btn">Start Now</a>

<p class="contact">📞 Call/WhatsApp: 7082575384</p>

<!-- Offer -->
<div class="offer">
  <h2>🔥 Limited Offer</h2>
  <p class="timer" id="timer">24:00:00</p>
</div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/917082575384">Chat</a>

<script>
// Countdown Timer
let time = 86400;

setInterval(() => {
  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    h + "h " + m + "m " + s + "s";

  if (time > 0) time--;
}, 1000);
</script>

</body>
</html>
