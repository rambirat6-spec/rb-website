<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Web Service</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#020617;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:50px;
height:50px;
border-radius:50%;
animation:spin 6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px;
}

.hero h1{
font-size:28px;
color:#22c55e;
}

.btn{
background:#22c55e;
padding:12px 25px;
color:black;
text-decoration:none;
border-radius:8px;
display:inline-block;
margin-top:20px;
font-weight:bold;
}

/* SERVICES */
.section{
padding:30px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
}

/* WORK */
.work img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:0.7;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h2>RB Web Service</h2>
</div>
<div>📞 7082575384</div>
</header>

<section class="hero">
<h1>🚀 Apne Business Ki Website Banwaye</h1>
<p>Fast | Professional | Affordable</p>
<a href="order.html" class="btn">📩 Order Now</a>
</section>

<section class="section">
<h2>🔥 Our Services</h2>

<div class="cards">
<div class="card">Kiryana</div>
<div class="card">Medical</div>
<div class="card">Restaurant</div>
<div class="card">Jewellery</div>
<div class="card">Mobile Shop</div>
<div class="card">Clothing</div>
</div>
</section>

<section class="section work">
<h2>📸 Our Work</h2>

<img src="https://via.placeholder.com/400x250?text=Website+Demo+1">
<img src="https://via.placeholder.com/400x250?text=Website+Demo+2">
<img src="https://via.placeholder.com/400x250?text=Website+Demo+3">

</section>

<footer>
<p>© 2026 RB Web Service</p>
</footer>

</body>
</html>
