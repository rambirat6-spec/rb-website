<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now - Professional Order Form</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
min-height:100vh;
padding:20px;
color:white;
}

.container{max-width:600px;margin:auto;padding-top:40px;}

.header{text-align:center;margin-bottom:40px;}
.header h1{
font-size:2.5rem;
background:linear-gradient(to right,#22c55e,#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.header p{color:#94a3b8;}

.form-card{
background:rgba(30,41,59,0.7);
border-radius:20px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.form-group{margin-bottom:20px;}

label{display:block;margin-bottom:6px;color:#cbd5e1;}

input,select,textarea{
width:100%;
padding:12px;
background:#0f172a;
border:2px solid #334155;
border-radius:10px;
color:white;
}

input:focus,select:focus,textarea:focus{
border-color:#22c55e;
outline:none;
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{background:#16a34a;}

.footer{text-align:center;margin-top:20px;color:#64748b;}

.spinner{
width:20px;height:20px;border:3px solid #fff;border-top-color:transparent;
border-radius:50%;animation:spin 1s linear infinite;
display:none;margin:auto;
}

@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📩 Order Form</h1>
<p>Fill details & connect on WhatsApp</p>
</div>

<div class="form-card">

<form id="orderForm" onsubmit="sendWhatsApp(event)">

<div class="form-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Service</label>
<select id="service">
<option>Website - ₹2999</option>
<option>Business Website - ₹3999</option>
<option>E-commerce - ₹5999</option>
</select>
</div>

<div class="form-group">
<label>Message</label>
<textarea id="message"></textarea>
</div>

<button type="submit">📱 Send on WhatsApp</button>

</form>

</div>

<div class="footer">
<p>© 2026 RB Web Service</p>
</div>

</div>

<script>
function sendWhatsApp(e){
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let service=document.getElementById("service").value;
let msg=document.getElementById("message").value;

let text=`New Order:%0AName: ${name}%0APhone: ${phone}%0AService: ${service}%0AMessage: ${msg}`;

window.open(`https://wa.me/917082575384?text=${text}`,'_blank');
}
</script>

</body>
</html>
