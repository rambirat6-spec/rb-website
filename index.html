<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Ultra Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
color:white;
overflow-x:hidden;
}

/* VIDEO BG */
video{
position:fixed;
min-width:100%;
min-height:100%;
z-index:-2;
object-fit:cover;
}

/* GRADIENT OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#000000cc,#001f3fcc,#000);
z-index:-1;
}

/* NAVBAR */
nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 40px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
z-index:1000;
}

nav img{
height:55px;
border-radius:50%;
animation:spin 6s linear infinite;
box-shadow:0 0 20px cyan;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
text-shadow:0 0 30px cyan;
}

.hero p{
margin-top:10px;
font-size:20px;
}

.btn{
padding:15px 35px;
background:linear-gradient(45deg,cyan,blue);
border:none;
border-radius:30px;
margin-top:20px;
cursor:pointer;
color:white;
font-size:18px;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
margin:20px;
border-radius:20px;
display:inline-block;
width:260px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 20px cyan;
}

/* SECTION */
.section{
padding:80px 20px;
text-align:center;
}

/* COUNTDOWN */
#timer{
font-size:30px;
color:cyan;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:30px;
border-radius:10px;
display:none;
z-index:999;
}

/* SALES POPUP */
.sale{
position:fixed;
bottom:20px;
left:20px;
background:black;
padding:10px 20px;
border-radius:10px;
display:none;
}

/* BUTTONS */
.whatsapp,.call{
position:fixed;
right:20px;
padding:15px;
border-radius:50%;
color:white;
}

.whatsapp{bottom:20px;background:green;}
.call{bottom:80px;background:blue;}

</style>
</head>

<body>

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-a-programmer-working-5176/1080p.mp4">
</video>

<div class="overlay"></div>

<nav>
<img src="https://i.postimg.cc/8z1ZQZkT/IMG-20260320-141037.jpg">
</nav>

<div class="hero">
<h1>🚀 Get Website in 24 Hours</h1>
<p>Limited Offer Ending Soon</p>
<div id="timer">05:00</div>
<button class="btn" onclick="openPopup()">Start Now</button>
</div>

<div class="section">
<h2>Our Services</h2>

<div class="card">💻 Website Design</div>
<div class="card">📱 Mobile Friendly</div>
<div class="card">⚡ Fast Delivery</div>

</div>

<div class="section">
<h2>Pricing</h2>

<div class="card">₹2999</div>
<div class="card">₹3999</div>

</div>

<div class="popup" id="popup">
<h3>Enter Details</h3>
<input placeholder="Name"><br><br>
<input placeholder="Phone"><br><br>
<button onclick="closePopup()">Submit</button>
</div>

<div class="sale" id="sale">🔥 Someone just purchased!</div>

<a class="whatsapp" href="https://wa.me/917082575384">💬</a>
<a class="call" href="tel:7082575384">📞</a>

<script>

/* POPUP */
function openPopup(){document.getElementById("popup").style.display="block";}
function closePopup(){document.getElementById("popup").style.display="none";}

/* AUTO POPUP */
setTimeout(openPopup,4000);

/* COUNTDOWN */
let time=300;
setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=`${m}:${s<10?'0'+s:s}`;
time--;
},1000);

/* FAKE SALES */
setInterval(()=>{
let sale=document.getElementById("sale");
sale.style.display="block";
setTimeout(()=>sale.style.display="none",3000);
},7000);

</script>

</body>
</html>
