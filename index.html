<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Web Service</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
position:sticky;
top:0;
}

.logo{
display:flex;
align-items:center;
}

.logo img{
width:50px;
margin-right:10px;
animation:spin 6s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.phone{
color:#22c55e;
font-weight:bold;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:28px;
margin-bottom:10px;
}

.hero p{
opacity:0.8;
margin-bottom:20px;
}

.btn{
background:linear-gradient(45deg,#22c55e,#4ade80);
padding:12px 20px;
border-radius:8px;
text-decoration:none;
color:white;
display:inline-block;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTION */
.section{
padding:30px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* PRICING */
.price{
font-size:22px;
color:#22c55e;
}

.highlight{
border:2px solid #22c55e;
}

/* FOOTER */
footer{
background:#020617;
padding:15px;
text-align:center;
margin-top:30px;
}

/* WHATSAPP FLOAT */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:12px;
border-radius:50%;
text-decoration:none;
color:white;
font-size:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h3>RB Web</h3>
</div>
<div class="phone">📞 7082575384</div>
</header>

<section class="hero">
<h1>Professional Website Banwaye</h1>
<p>Har business ke liye modern website</p>
<a href="https://wa.me/917082575384" class="btn">Order Now</a>
</section>

<section class="section">
<h2>Our Services</h2>
<div class="cards">
<div class="card">Kiryana</div>
<div class="card">Medical</div>
<div class="card">Restaurant</div>
<div class="card">Jewellery</div>
<div class="card">Mobile Shop</div>
</div>
</section>

<section class="section">
<h2>Pricing</h2>
<div class="cards">
<div class="card">
<h3>Basic</h3>
<p class="price">₹2999</p>
</div>

<div class="card highlight">
<h3>Premium ⭐</h3>
<p class="price">₹3999</p>
</div>
</div>
</section>

<section class="section">
<h2>Features</h2>
<div class="cards">
<div class="card">Fast Website</div>
<div class="card">Mobile Friendly</div>
<div class="card">WhatsApp Support</div>
<div class="card">SEO Ready</div>
</div>
</section>

<footer>
<p>© 2026 RB Web Service</p>
</footer>

<a href="https://wa.me/917082575384" class="whatsapp">💬</a>

</body>
</html>
