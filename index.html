<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Final Boss</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{color:white;overflow-x:hidden;background:black;}

/* VIDEO BG */
video{
position:fixed;
min-width:100%;
min-height:100%;
z-index:-2;
object-fit:cover;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* NAV */
nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
z-index:1000;
}

nav img{
height:55px;
border-radius:50%;
box-shadow:0 0 20px cyan;
animation:spin 6s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:55px;
text-shadow:0 0 25px cyan;
}

.btn{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,cyan,blue);
color:white;
font-size:18px;
cursor:pointer;
}

/* SECTION */
.section{padding:80px 20px;text-align:center;}

.card{
background:rgba(255,255,255,0.08);
margin:15px;
padding:25px;
border-radius:15px;
display:inline-block;
width:250px;
}

/* TIMER */
#timer{font-size:28px;color:cyan;margin-top:10px;}

/* FORM */
input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
display:none;
z-index:999;
}

/* CHATBOT */
.chat{
position:fixed;
bottom:100px;
right:20px;
background:white;
color:black;
padding:10px;
border-radius:10px;
display:none;
}

/* FLOAT BUTTON */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:green;
padding:15px;
border-radius:50%;
}

</style>
</head>

<body>

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-working-on-code-5176/1080p.mp4">
</video>
<div class="overlay"></div>

<nav>
<img src="https://i.postimg.cc/8z1ZQZkT/IMG-20260320-141037.jpg">
</nav>

<div class="hero">
<h1>💰 Get Website & Start Earning</h1>
<div id="timer">05:00</div>
<button class="btn" onclick="openPopup()">Get Now</button>
</div>

<div class="section">
<h2>Pricing</h2>
<div class="card">Basic ₹2999</div>
<div class="card">Premium ₹3999</div>
</div>

<div class="section">
<h2>Contact</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<br>
<button class="btn" onclick="sendLead()">Submit</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<h3>Limited Offer!</h3>
<button onclick="closePopup()">Close</button>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
Hi 👋 Need website?
<br><button onclick="chatWhats()">Yes</button>
</div>

<a class="whatsapp" href="https://wa.me/917082575384">💬</a>

<script>

/* POPUP */
function openPopup(){popup.style.display="block";}
function closePopup(){popup.style.display="none";}
setTimeout(openPopup,4000);

/* TIMER */
let t=300;
setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
timer.innerText=`${m}:${s<10?'0'+s:s}`;
t--;
},1000);

/* WHATSAPP LEAD */
function sendLead(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let msg=`Name: ${name} Phone: ${phone}`;
window.open(`https://wa.me/917082575384?text=${msg}`);
}

/* CHATBOT */
setTimeout(()=>{chat.style.display="block";},6000);
function chatWhats(){
window.open("https://wa.me/917082575384");
}

</script>

</body>
</html>
