<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RB Web Service</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BACKGROUND SLIDER */
body{
  color:white;
  background-size:cover;
  background-position:center;
  animation:slider 20s infinite;
}

@keyframes slider{
  0%{background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');}
  25%{background-image:url('https://images.unsplash.com/photo-1508780709619-79562169bc64');}
  50%{background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');}
  75%{background-image:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');}
  100%{background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');}
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

nav h2{
  color:#22c55e;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
  animation:fade 2s ease;
}

.hero h1{
  font-size:45px;
}

.hero span{
  color:#22c55e;
}

.btn{
  margin-top:20px;
  padding:14px 28px;
  background:#22c55e;
  border:none;
  border-radius:30px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#16a34a;
  transform:scale(1.1);
}

/* SERVICES */
.services{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:40px;
}

.box{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  width:250px;
  text-align:center;
  transition:0.3s;
}

.box:hover{
  transform:translateY(-10px);
}

/* PORTFOLIO */
.portfolio{
  text-align:center;
  padding:50px;
}

.port{
  display:inline-block;
  margin:10px;
}

.port img{
  width:250px;
  border-radius:10px;
}

/* PRICING */
.pricing{
  text-align:center;
  padding:50px;
}

.plan{
  display:inline-block;
  margin:15px;
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  width:200px;
}

.price{
  color:#22c55e;
  font-size:22px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.7);
}

@keyframes fade{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
  <h2>RB Web Service</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Portfolio</a>
    <a href="#">Pricing</a>
  </div>
</nav>

<section class="hero">
  <h1>Apni Shop Ko <span>Online Lao</span></h1>
  <p>Sirf ₹2999 me professional website</p>
  <button class="btn" onclick="openWhatsApp()">WhatsApp Karo</button>
</section>

<section class="services">
  <div class="box">💎 Jewellery Website</div>
  <div class="box">🛒 Kirana Store</div>
  <div class="box">👕 Clothing Shop</div>
</section>

<section class="portfolio">
  <h1>Portfolio</h1>
  <div class="port">
    <img src="https://images.unsplash.com/photo-1556740749-887f6717d7e4">
  </div>
  <div class="port">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
  </div>
</section>

<section class="pricing">
  <h1>Pricing</h1>

  <div class="plan">
    <h2>Basic</h2>
    <div class="price">₹2999</div>
  </div>

  <div class="plan">
    <h2>Pro</h2>
    <div class="price">₹3999</div>
  </div>
</section>

<div class="footer">
  📞 7082575384 | RB Web Service
</div>

<script>
function openWhatsApp(){
  window.open("https://wa.me/917082575384","_blank");
}
</script>

</body>
</html>
