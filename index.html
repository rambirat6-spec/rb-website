<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Website - Ultra Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* VIDEO BACKGROUND */
video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
}

/* NAVBAR */
nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

nav img{
height:55px;
border-radius:50%;
animation:spin 6s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h1{
font-size:55px;
text-shadow:0 0 25px cyan;
}

.hero button{
padding:15px 30px;
border:none;
background:cyan;
color:black;
font-size:18px;
margin-top:20px;
cursor:pointer;
border-radius:10px;
}

/* SECTION */
.section{
padding:80px 20px;
text-align:center;
background:#111;
color:white;
}

.card{
background:#222;
margin:20px;
padding:25px;
border-radius:15px;
display:inline-block;
width:260px;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
display:none;
z-index:999;
border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-programming-typing-5176/1080p.mp4">
</video>

<!-- NAVBAR -->
<nav>
<img src="https://i.postimg.cc/8z1ZQZkT/IMG-20260320-141037.jpg">
<div>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>🔥 Get Your Website in 24 Hours</h1>
<p>Professional | Fast | Affordable</p>
<button onclick="openPopup()">Start Now</button>
</div>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>

<div class="card">💻 Website Design</div>
<div class="card">📱 Mobile Friendly</div>
<div class="card">🚀 Fast Delivery</div>

</div>

<!-- PRICING -->
<div class="section">
<h2>Pricing</h2>

<div class="card">
<h3>Basic</h3>
<p>₹2999</p>
</div>

<div class="card">
<h3>Premium</h3>
<p>₹3999</p>
</div>

</div>

<!-- VISITOR COUNTER -->
<div class="section">
<h2>Visitors</h2>
<p id="counter">0</p>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<h3>Enter Details</h3>
<input type="text" placeholder="Name"><br><br>
<input type="text" placeholder="Phone"><br><br>
<button onclick="closePopup()">Submit</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/917082575384">💬</a>

<script>

/* POPUP */
function openPopup(){
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* AUTO POPUP */
setTimeout(openPopup,3000);

/* COUNTER */
let count=0;
setInterval(()=>{
count++;
document.getElementById("counter").innerText=count;
},1000);

</script>

</body>
</html>
