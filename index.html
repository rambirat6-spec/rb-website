<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* TOP BAR */
.topbar{
position:fixed;
top:0;
width:100%;
background:#00c853;
text-align:center;
padding:6px;
z-index:999;
}

/* VIDEO BG */
video{
position:fixed;
min-width:100%;
min-height:100%;
z-index:-2;
object-fit:cover;
}
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* NAV */
nav{
position:fixed;
top:30px;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.6);
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h1{
font-size:40px;
text-shadow:0 0 20px cyan;
}
.btn{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
background:cyan;
color:black;
font-size:18px;
cursor:pointer;
}

/* SECTION */
.section{padding:80px 20px;text-align:center;}
.card{
background:#111;
margin:10px;
padding:20px;
border-radius:10px;
display:inline-block;
width:250px;
}

/* SCROLL IMAGE */
.scroll-section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}
.scroll-section img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}
.scroll-section.active img{opacity:1;}

.scroll-text{
position:relative;
z-index:2;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:green;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<div class="topbar">🔥 WhatsApp: 7082575384</div>

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-working-on-code-5176/1080p.mp4">
</video>
<div class="overlay"></div>

<nav>
<div>RB Website</div>
</nav>

<div class="hero">
<h1>🚀 Get Website & Grow Business</h1>
<button class="btn" onclick="whatsapp()">Start Now</button>
</div>

<div class="section">
<h2>Services</h2>
<div class="card">💻 Website Design</div>
<div class="card">📱 Mobile Friendly</div>
<div class="card">⚡ Fast Delivery</div>
</div>

<!-- SCROLL IMAGES -->
<div class="scroll-section">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
<div class="scroll-text">Professional Website</div>
</div>

<div class="scroll-section">
<img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c">
<div class="scroll-text">Fast Speed</div>
</div>

<div class="scroll-section">
<img src="https://images.unsplash.com/photo-1531297484001-80022131f5a1">
<div class="scroll-text">Mobile Friendly</div>
</div>

<div class="scroll-section">
<img src="https://images.unsplash.com/photo-1526378722484-bd91ca387e72">
<div class="scroll-text">Grow Your Business</div>
</div>

<div class="section">
<h2>Pricing</h2>
<div class="card">₹2999</div>
<div class="card">₹3999</div>
</div>

<div class="section">
<h2>Contact Now</h2>
<button class="btn" onclick="whatsapp()">Chat on WhatsApp</button>
</div>

<a class="whatsapp" href="https://wa.me/917082575384">💬</a>

<script>
function whatsapp(){
window.open("https://wa.me/917082575384?text=Hi I want website");
}

let sections=document.querySelectorAll(".scroll-section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
let top=sec.getBoundingClientRect().top;
if(top<window.innerHeight/1.3){
sec.classList.add("active");
}
});
});
</script>

</body>
</html>
