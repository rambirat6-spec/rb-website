<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Web Service</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #22c55e;
}

.logo h2{
color:#22c55e;
}

.phone{
color:#38bdf8;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:34px;
color:#22c55e;
}

.hero p{
margin-top:10px;
opacity:0.7;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#22c55e;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#16a34a;
}

/* SERVICES */
.section{
padding:40px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
}

/* FOOTER */
footer{
padding:20px;
text-align:center;
opacity:0.6;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h2>RB Web Service</h2>
</div>
<div class="phone">📞 7082575384</div>
</header>

<section class="hero">
<h1>🚀 Apne Business Ki Website Banwaye</h1>
<p>Fast | Professional | Affordable</p>

<a href="order.html" class="btn">📩 Order Now</a>
</section>

<section class="section">
<h2>🔥 Our Services</h2>
<div class="cards">
<div class="card">Kiryana</div>
<div class="card">Medical</div>
<div class="card">Restaurant</div>
<div class="card">Jewellery</div>
<div class="card">Mobile</div>
</div>
</section>

<footer>
<p>© 2026 RB Web Service</p>
</footer>

</body>
</html>
