<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB Website Service</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #001f3f, #000);
  color: #fff;
  text-align: center;
}

/* Logo */
.logo {
  width: 180px;
  margin-top: 40px;
  border-radius: 20px;
  box-shadow: 0 0 30px #00cfff;
}

/* Title */
h1 {
  font-size: 34px;
  margin-top: 15px;
}

.tagline {
  color: #ccc;
  margin: 10px;
}

/* Button */
.btn {
  background: #00cfff;
  color: #000;
  padding: 14px 28px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #00aacc;
}

/* Contact */
.contact {
  margin-top: 15px;
  color: #00ffff;
  font-size: 18px;
}

/* Offer Box */
.offer {
  background: rgba(255,255,255,0.05);
  margin: 30px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

.timer {
  font-size: 26px;
  color: #00ffcc;
  margin-top: 10px;
}

/* WhatsApp Button */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 14px 20px;
  border-radius: 50px;
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGO (IMPORTANT: same folder me logo.jpg hona chahiye) -->
<img src="logo.jpg" class="logo">

<h1>RB Website Service</h1>
<p class="tagline">Apni Shop ko Online lekar jao 🚀</p>

<a href="#" class="btn">Start Now</a>

<p class="contact">📞 Call/WhatsApp: 7082575384</p>

<!-- OFFER -->
<div class="offer">
  <h2>🔥 Limited Offer</h2>
  <p class="timer" id="timer">24:00:00</p>
</div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/917082575384">Chat</a>

<script>
// Countdown Timer
let time = 86400;

setInterval(() => {
  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    h + "h " + m + "m " + s + "s";

  if (time > 0) time--;
}, 1000);
</script>

</body>
</html>
